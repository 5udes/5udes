
<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>5udes - Graffiti Portfolyosu</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@800&family=Luckiest+Guy&display=swap" rel="stylesheet">
    
    <style>
        body {
            margin: 0;
            padding: 20px;
            background-color: #e0d8f0;
            font-family: 'Montserrat', sans-serif; /* Ana fontu değiştirdik */
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        /* En üstteki başlık */
        .header-title {
            font-weight: 800; /* Kalın */
            color: #000;
            margin-top: 20px;
            margin-bottom: 40px;
            letter-spacing: 1px;
            z-index: 1;
        }

        .watermark {
            position: fixed;
            font-family: 'Luckiest Guy', cursive;
            font-size: 20vw;
            color: #cbb4e7;
            opacity: 0.2;
            z-index: 0;
            transform: rotate(-10deg);
            pointer-events: none;
            top: 25%;
        }

        .graffiti-card {
            background: rgba(255, 255, 255, 0.6);
            padding: 20px;
            border-radius: 20px;
            margin-bottom: 40px;
            width: 90%;
            max-width: 400px;
            text-align: center;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            z-index: 1;
        }

        .graffiti-card img {
            width: 100%;
            border-radius: 10px;
            margin-bottom: 15px;
        }

        .footer { margin-top: 20px; text-align: center; padding-bottom: 30px; z-index: 1; }
    </style>
</head>
<body>

    <div class="watermark">5udes</div>

    <div class="header-title">GRAFFITI GÜNLÜĞÜM :3</div>

    <div class="graffiti-card">
        <img src="resim1.jpg" alt="Graffiti 1">
        <h3>Graffiti Başlığı</h3>
        <p>Buraya graffiti hakkında yazını yazabilirsin.</p>
    </div>

    <div class="footer">
        <div style="font-size: 0.7rem; font-weight: bold; letter-spacing: 2px;">INSTAGRAM</div>
        <a href="https://instagram.com/5udes" target="_blank" style="font-weight: 800; color: #000; text-decoration: none; font-size: 1.1rem;">@5UDES</a>
    </div>

</body>
</html>
