<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>5udes - Günlük</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@200;400;600&display=swap" rel="stylesheet">
    
    <style>
        body {
            margin: 0;
            padding: 40px 20px;
            /* Soft pembe arka plan */
            background-color: #ffeef2; 
            font-family: 'Poppins', sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            color: #555;
        }

        .header-title {
            font-weight: 600;
            color: #d88fa3;
            margin-bottom: 50px;
            font-size: 1.8rem;
            letter-spacing: 2px;
            text-transform: uppercase;
        }

        .watermark {
            position: fixed;
            font-family: 'Poppins', sans-serif;
            font-weight: 800;
            font-size: 12vw;
            color: #f7dadd;
            z-index: 0;
            user-select: none;
            pointer-events: none;
            top: 40%;
        }

        .graffiti-card {
            background: rgba(255, 255, 255, 0.7);
            padding: 30px;
            border-radius: 30px;
            margin-bottom: 30px;
            width: 90%;
            max-width: 450px;
            text-align: center;
            box-shadow: 0 10px 25px rgba(0,0,0,0.03);
            z-index: 1;
            border: 1px solid #fff;
        }

        .footer { 
            margin-top: 40px; 
            z-index: 1; 
            text-align: center; 
        }
    </style>
</head>
<body>

    <div class="watermark">5udes</div>

    <div class="header-title">graffiti günlüğüm :3</div>

    <div class="graffiti-card">
        <p style="font-weight: 200;">Burada yeni graffiti çalışmalarım yer alacak. Henüz içerik eklenmedi, yakında çok güzel şeyler burada olacak.</p>
    </div>

    <div class="footer">
        <a href="https://instagram.com/5udes" target="_blank" style="color: #d88fa3; text-decoration: none; font-size: 0.8rem; letter-spacing: 1px;">INSTAGRAM: @5UDES</a>
    </div>

</body>
</html>
